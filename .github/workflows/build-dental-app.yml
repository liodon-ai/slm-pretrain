name: Build Dental App

on:
  push:
    paths:
      - "dental/app/**"
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: liodon-dental
            binary: dist/liodon-dental
          - os: windows-latest
            artifact: liodon-dental.exe
            binary: dist/liodon-dental.exe
          - os: macos-latest
            artifact: liodon-dental-macos
            binary: dist/liodon-dental

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller fastapi uvicorn pillow numpy onnxruntime python-multipart

      - name: Download model from HuggingFace
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          from huggingface_hub import hf_hub_download
          import shutil, os
          path = hf_hub_download(
              repo_id="liodon-ai/dental-panoramic-detector",
              filename="best.onnx",
          )
          shutil.copy(path, "dental/app/model.onnx")
          print("model.onnx ready:", os.path.getsize("dental/app/model.onnx"), "bytes")
          EOF
        shell: bash

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: dental/app
        run: |
          pyinstaller \
            --onefile \
            --name "liodon-dental" \
            --add-data "model.onnx:." \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.loops" \
            --hidden-import "uvicorn.loops.auto" \
            --hidden-import "uvicorn.protocols" \
            --hidden-import "uvicorn.protocols.http" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --hidden-import "uvicorn.protocols.websockets" \
            --hidden-import "uvicorn.protocols.websockets.auto" \
            --hidden-import "uvicorn.lifespan" \
            --hidden-import "uvicorn.lifespan.on" \
            --hidden-import "onnxruntime" \
            --hidden-import "onnxruntime.capi._pybind_state" \
            --hidden-import "PIL" \
            --hidden-import "multipart" \
            --collect-submodules "onnxruntime.capi" \
            --exclude-module "torch" \
            --exclude-module "torchvision" \
            --exclude-module "torchaudio" \
            --exclude-module "ultralytics" \
            --exclude-module "onnxruntime.tools" \
            --exclude-module "onnxruntime.transformers" \
            --exclude-module "onnxruntime.training" \
            --exclude-module "onnxruntime.quantization" \
            --exclude-module "scipy" \
            --exclude-module "sklearn" \
            --exclude-module "matplotlib" \
            --exclude-module "pandas" \
            --exclude-module "cv2" \
            --exclude-module "tensorflow" \
            server.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: dental/app
        run: |
          pyinstaller `
            --onefile `
            --name "liodon-dental" `
            --add-data "model.onnx;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "onnxruntime" `
            --hidden-import "onnxruntime.capi._pybind_state" `
            --hidden-import "PIL" `
            --hidden-import "multipart" `
            --collect-submodules "onnxruntime.capi" `
            --exclude-module "torch" `
            --exclude-module "torchvision" `
            --exclude-module "torchaudio" `
            --exclude-module "ultralytics" `
            --exclude-module "onnxruntime.tools" `
            --exclude-module "onnxruntime.transformers" `
            --exclude-module "onnxruntime.training" `
            --exclude-module "onnxruntime.quantization" `
            --exclude-module "scipy" `
            --exclude-module "sklearn" `
            --exclude-module "matplotlib" `
            --exclude-module "pandas" `
            --exclude-module "cv2" `
            --exclude-module "tensorflow" `
            server.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dental/app/${{ matrix.binary }}
          retention-days: 30
